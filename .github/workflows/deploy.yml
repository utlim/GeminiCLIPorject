# 🚀 GitHub Actions를 이용한 대시보드 자동 배포 워크플로우

name: Deploy Bestseller Dashboard to Pages

on:
  push:
    branches:
      - master # master 브랜치에 코드가 push될 때만 자동 작동
    paths:
      - 'dashboard/**' # 대시보드 관련 소스 변동 시에만 배포
      
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 원격 저장소 코드 체크아웃
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Node.js 환경 구축
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './dashboard/package-lock.json'

      # 3. 프론트엔드 빌드 의존성 패키지 설치
      - name: Install Dependencies
        run: |
          cd dashboard
          npm ci

      # 4. TypeScript 타입 검증 및 Vite 빌드 실행
      - name: Build Dashboard
        run: |
          cd dashboard
          npm run build

      # 5. gh-pages 브랜치 배포 (정적 빌드본 dist만 골라서 무결점 push)
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dashboard/dist # 빌드 결과물이 모여있는 폴더
          branch: gh-pages # 호스팅을 지원할 대상 브랜치
          clean: true # node_modules 등 불필요 유산 자동 소거
